name: trenx
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  http: ^1.6.0
  cached_network_image: ^3.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/exercise_placeholder.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/ZeniVital.png"
  min_sdk_android: 21
